<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="ad.size" content="width=320,height=480">
<title>TAROTIQ - Reveal Your Destiny</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
@import url('https://fonts.googleapis.com/css2?family=Newsreader:ital,wght@0,300;0,600;1,400&family=Space+Grotesk:wght@500;700&display=swap');
body,html{width:320px;height:480px;overflow:hidden}
.ad{position:relative;width:320px;height:480px;background:linear-gradient(180deg,#0E0E11 0%,#1B1B1E 50%,#131316 100%);overflow:hidden;cursor:pointer}
.stars{position:absolute;top:0;left:0;width:100%;height:100%}
.star{position:absolute;width:2px;height:2px;background:#E4E1E6;border-radius:50%;animation:twinkle var(--d,3s) ease-in-out infinite var(--delay,0s)}
@keyframes twinkle{0%,100%{opacity:.2}50%{opacity:1}}
.nebula{position:absolute;width:300px;height:300px;border-radius:50%;filter:blur(80px);opacity:.15}
.nebula-1{top:-80px;right:-60px;background:#EDB1FF}
.nebula-2{bottom:-60px;left:-80px;background:#883CA6}
.header{position:absolute;top:28px;left:0;right:0;text-align:center;z-index:10}
.logo-text{font-family:'Space Grotesk',sans-serif;font-size:11px;letter-spacing:4px;color:#E9C349;font-weight:700}
.headline{font-family:'Newsreader',serif;font-size:28px;color:#E4E1E6;margin-top:10px;font-weight:300;line-height:1.2}
.headline em{color:#EDB1FF;font-style:italic}
.card-container{position:absolute;top:48%;left:50%;transform:translate(-50%,-50%);perspective:800px;z-index:10}
.card{width:140px;height:220px;position:relative;transform-style:preserve-3d;transition:transform .8s cubic-bezier(.4,0,.2,1);cursor:pointer}
.card.flipped{transform:rotateY(180deg)}
.card-face{position:absolute;width:100%;height:100%;backface-visibility:hidden;border-radius:10px;overflow:hidden}
.card-back img,.card-front img{width:100%;height:100%;object-fit:cover;display:block}
.card-back{border:1.5px solid rgba(233,195,73,.3);border-radius:10px;overflow:hidden}
.card-front{transform:rotateY(180deg);border:1.5px solid #E9C349;border-radius:10px;overflow:hidden}
.card-glow{position:absolute;top:48%;left:50%;transform:translate(-50%,-50%);width:180px;height:260px;border-radius:20px;background:radial-gradient(ellipse,rgba(233,195,73,.15),transparent 70%);animation:cardPulse 3s ease-in-out infinite;z-index:5}
@keyframes cardPulse{0%,100%{opacity:.3;transform:translate(-50%,-50%) scale(1)}50%{opacity:.6;transform:translate(-50%,-50%) scale(1.05)}}
.card-name{position:absolute;bottom:170px;left:0;right:0;text-align:center;z-index:10;opacity:0}
.card-name.show{animation:fadeIn .5s ease .4s forwards}
.card-name span{font-family:'Newsreader',serif;font-size:18px;color:#E9C349;font-weight:600}
.tap-hint{position:absolute;bottom:130px;left:0;right:0;text-align:center;z-index:10}
.tap-text{font-family:'Space Grotesk',sans-serif;font-size:10px;letter-spacing:2px;color:#C8C4D7;animation:pulse 2s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:.4}50%{opacity:1}}
.tap-hint.hidden{display:none}
.reveal-text{position:absolute;bottom:95px;left:0;right:0;text-align:center;z-index:10;opacity:0}
.reveal-text.show{animation:fadeIn .6s ease .3s forwards}
.reveal-msg{font-family:'Newsreader',serif;font-size:14px;color:#EDB1FF;font-style:italic}
.cta{position:absolute;bottom:36px;left:50%;transform:translateX(-50%);z-index:10;opacity:0}
.cta.show{animation:fadeInUp .5s ease forwards}
.cta-btn{display:block;padding:14px 40px;background:linear-gradient(135deg,#E9C349,#CCA730);border-radius:30px;font-family:'Space Grotesk',sans-serif;font-size:13px;font-weight:700;letter-spacing:1.5px;color:#0E0E11;text-transform:uppercase;text-decoration:none;white-space:nowrap;box-shadow:0 0 30px rgba(233,195,73,.3)}
@keyframes fadeInUp{from{opacity:0;transform:translateX(-50%) translateY(20px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
@keyframes fadeIn{to{opacity:1}}
</style>
</head>
<body>
<div class="ad" id="ad" onclick="handleClick()">
  <div class="stars" id="stars"></div>
  <div class="nebula nebula-1"></div>
  <div class="nebula nebula-2"></div>
  <div class="header">
    <div class="logo-text">TAROTIQ</div>
    <h1 class="headline">What do the stars<br><em>tell you?</em></h1>
  </div>
  <div class="card-glow"></div>
  <div class="card-container">
    <div class="card" id="card" onclick="flipCard(event)">
      <div class="card-face card-back"><img src="card_back.webp" alt="Tarot card"></div>
      <div class="card-face card-front"><img src="the_star.webp" alt="The Star"></div>
    </div>
  </div>
  <div class="card-name" id="cardName"><span>The Star</span></div>
  <div class="tap-hint" id="tapHint"><span class="tap-text">&#9650; Tap the card &#9650;</span></div>
  <div class="reveal-text" id="revealText"><span class="reveal-msg">The stars have a message for you...</span></div>
  <div class="cta" id="cta"><a class="cta-btn" href="https://play.google.com/store/apps/details?id=com.tarotiq.app" target="_blank">Reveal for free</a></div>
</div>
<script>
(function(){var s=document.getElementById('stars');for(var i=0;i<60;i++){var d=document.createElement('div');d.className='star';d.style.left=Math.random()*100+'%';d.style.top=Math.random()*100+'%';d.style.setProperty('--d',(2+Math.random()*4)+'s');d.style.setProperty('--delay',Math.random()*3+'s');d.style.width=d.style.height=(1+Math.random()*2)+'px';s.appendChild(d)}})();
var flipped=false;
function flipCard(e){e.stopPropagation();if(flipped)return;flipped=true;document.getElementById('card').classList.add('flipped');document.getElementById('tapHint').classList.add('hidden');setTimeout(function(){document.getElementById('cardName').classList.add('show')},500);setTimeout(function(){document.getElementById('revealText').classList.add('show')},800);setTimeout(function(){document.getElementById('cta').classList.add('show')},1400);}
function handleClick(){if(flipped)window.open('https://play.google.com/store/apps/details?id=com.tarotiq.app','_blank')}
</script>
</body>
</html>
