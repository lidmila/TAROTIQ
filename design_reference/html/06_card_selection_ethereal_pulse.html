<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif:ital,wght@0,300;0,400;0,700;1,300&amp;family=Manrope:wght@300;400;600;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "inverse-primary": "#6349c0",
              "on-primary": "#330b91",
              "surface-tint": "#cbbeff",
              "surface-container": "#211e28",
              "secondary-container": "#af8d11",
              "on-secondary-fixed-variant": "#574500",
              "surface-container-highest": "#36333e",
              "on-primary-container": "#927af3",
              "surface-bright": "#3b3842",
              "surface-dim": "#14121b",
              "on-tertiary-container": "#8c8d8d",
              "on-primary-fixed-variant": "#4a2ea7",
              "surface-container-high": "#2b2933",
              "surface-variant": "#36333e",
              "tertiary": "#c6c6c6",
              "on-surface-variant": "#cbc4d0",
              "outline": "#948e99",
              "on-secondary": "#3c2f00",
              "on-error": "#690005",
              "on-secondary-container": "#342800",
              "inverse-on-surface": "#322f39",
              "secondary": "#e9c349",
              "primary": "#cbbeff",
              "on-tertiary": "#2f3131",
              "inverse-surface": "#e6e0ee",
              "secondary-fixed": "#ffe088",
              "on-background": "#e6e0ee",
              "error-container": "#93000a",
              "tertiary-fixed": "#e3e2e2",
              "on-primary-fixed": "#1e0061",
              "on-secondary-fixed": "#241a00",
              "surface-container-low": "#1c1a24",
              "tertiary-container": "#242626",
              "on-tertiary-fixed": "#1a1c1c",
              "primary-fixed": "#e7deff",
              "secondary-fixed-dim": "#e9c349",
              "on-tertiary-fixed-variant": "#464747",
              "primary-fixed-dim": "#cbbeff",
              "primary-container": "#28007b",
              "error": "#ffb4ab",
              "on-error-container": "#ffdad6",
              "outline-variant": "#49454e",
              "on-surface": "#e6e0ee",
              "tertiary-fixed-dim": "#c6c6c6",
              "surface": "#14121b",
              "surface-container-lowest": "#0f0d16",
              "background": "#14121b"
            },
            fontFamily: {
              "headline": ["Noto Serif"],
              "body": ["Manrope"],
              "label": ["Manrope"]
            },
            borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
            animation: {
              'pulse-glow': 'pulse-glow 4s ease-in-out infinite',
              'nebula-float': 'nebula-float 20s ease-in-out infinite alternate',
            },
            keyframes: {
              'pulse-glow': {
                '0%, 100%': { boxShadow: '0 0 15px rgba(203, 190, 255, 0.1), inset 0 0 10px rgba(233, 195, 73, 0.05)' },
                '50%': { boxShadow: '0 0 30px rgba(203, 190, 255, 0.25), inset 0 0 20px rgba(233, 195, 73, 0.1)' },
              },
              'nebula-float': {
                '0%': { transform: 'translate(0, 0) scale(1)' },
                '100%': { transform: 'translate(-2%, 2%) scale(1.1)' },
              }
            }
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 200, 'GRAD' 0, 'opsz' 24;
        }
        .card-arc-container {
            perspective: 2000px;
        }
        .tarot-card {
            transition: transform 0.6s cubic-bezier(0.23, 1, 0.32, 1), box-shadow 0.6s cubic-bezier(0.23, 1, 0.32, 1);
            will-change: transform;
        }
        .tarot-card:hover {
            transform: translateY(-60px) scale(1.1) rotate(0deg) !important;
            z-index: 100 !important;
            box-shadow: 0 20px 50px rgba(203, 190, 255, 0.3);
        }
        .card-pattern {
            background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23e9c349' fill-opacity='0.08'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4v-4H4v4H0v2h4v4h2v-4h4v-2H6zm30 0v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
        }
        .glow-orb {
            box-shadow: 0 0 12px 2px currentColor;
        }
        .nebula-gradient {
            background: radial-gradient(circle at 50% 50%, rgba(99, 73, 192, 0.15) 0%, rgba(20, 18, 27, 0) 70%);
        }
    </style>
<style>
        body {
          min-height: max(884px, 100dvh);
        }
    </style>
</head>
<body class="bg-background text-on-surface font-body selection:bg-primary/30 min-h-screen flex flex-col overflow-hidden">
<!-- Top Navigation Anchor -->
<header class="bg-transparent flex justify-between items-center w-full px-6 py-6 fixed top-0 z-50">
<div class="flex items-center gap-3">
<div class="w-10 h-10 rounded-full bg-surface-container-high flex items-center justify-center overflow-hidden border border-outline-variant/20 shadow-lg shadow-primary/5">
<img alt="User Profile" class="w-full h-full object-cover" src="https://lh3.googleusercontent.com/aida-public/AB6AXuB__usBTmQW6ns6tN1IM7wVEG4vovXy2gcHyWlhKHhYuLbEMKpgvXuSCwr0KEYraIxwNiF2kW-WkVpWLwgzW6D3twRAqTYJeujtbUkCnGaYN0W1sxkmq7XEtv9tdbLSRpRT1iob3ABZBT0VIRkrLLtSzvCOFAZqe1gl-AH7RQNwe2P15SuA353KbjufzqpDDORpsUnJLpGoYwLVMV_R43l8i-TCJddyq4Cj2sFgTv_48DKfDLapYnVWX4t4CpWJoAstfFrYOZzm498"/>
</div>
<span class="font-headline font-light tracking-widest text-primary/80 text-sm">ARCHIVE ACCESS</span>
</div>
<div class="text-2xl font-headline italic text-secondary tracking-tight">Celestial Archive</div>
<button class="w-10 h-10 flex items-center justify-center text-primary hover:text-secondary transition-all duration-500 hover:scale-110 active:scale-90">
<span class="material-symbols-outlined !text-[28px] animate-pulse">auto_awesome</span>
</button>
</header>
<!-- Main Canvas -->
<main class="flex-grow flex flex-col items-center justify-center pt-24 pb-32 px-4 relative">
<!-- Enhanced Celestial Background -->
<div class="absolute inset-0 overflow-hidden pointer-events-none">
<div class="absolute top-[-10%] left-[-10%] w-[120%] h-[120%] nebula-gradient animate-nebula-float"></div>
<div class="absolute bottom-[-20%] right-[-10%] w-[80%] h-[80%] bg-secondary/5 blur-[120px] rounded-full animate-nebula-float" style="animation-delay: -5s;"></div>
<div class="absolute top-1/4 left-1/3 w-64 h-64 bg-primary/10 blur-[100px] rounded-full animate-nebula-float" style="animation-delay: -2s;"></div>
</div>
<!-- Guidance Header -->
<div class="text-center mb-16 relative z-10">
<h1 class="font-headline text-4xl md:text-5xl text-on-surface tracking-tight mb-4 drop-shadow-sm">Pick 3 cards for your reading</h1>
<p class="font-body text-on-surface-variant max-w-md mx-auto opacity-70 italic font-light tracking-wide">Focus your energy on your intention as you sweep across the deck.</p>
<!-- Selection Progress Indicators: Glowing Orbs -->
<div class="flex justify-center items-center gap-6 mt-10">
<div class="w-3 h-3 bg-secondary rounded-full glow-orb text-secondary transition-all duration-500 scale-125"></div>
<div class="w-2.5 h-2.5 bg-surface-container-highest rounded-full transition-all duration-500 text-surface-variant/40 hover:text-primary/40"></div>
<div class="w-2.5 h-2.5 bg-surface-container-highest rounded-full transition-all duration-500 text-surface-variant/40"></div>
</div>
</div>
<!-- Tarot Arc Selection -->
<div class="w-full max-w-6xl h-96 flex items-end justify-center card-arc-container relative">
<!-- Card 1 -->
<div class="tarot-card absolute w-40 h-64 bg-surface-container-low rounded-2xl border border-outline-variant/20 cursor-pointer overflow-hidden origin-bottom animate-pulse-glow" style="transform: rotate(-30deg) translateX(-300px); animation-delay: 0s;">
<div class="absolute inset-0 card-pattern opacity-40"></div>
<div class="absolute inset-4 border border-secondary/15 rounded-xl flex items-center justify-center backdrop-blur-[2px]">
<span class="material-symbols-outlined text-secondary/30 text-4xl">star_rate</span>
</div>
</div>
<!-- Card 2 -->
<div class="tarot-card absolute w-40 h-64 bg-surface-container-low rounded-2xl border border-outline-variant/20 cursor-pointer overflow-hidden origin-bottom animate-pulse-glow" style="transform: rotate(-20deg) translateX(-200px); animation-delay: 0.5s;">
<div class="absolute inset-0 card-pattern opacity-40"></div>
<div class="absolute inset-4 border border-secondary/15 rounded-xl flex items-center justify-center backdrop-blur-[2px]">
<span class="material-symbols-outlined text-secondary/30 text-4xl">star_rate</span>
</div>
</div>
<!-- Card 3 -->
<div class="tarot-card absolute w-40 h-64 bg-surface-container-low rounded-2xl border border-outline-variant/20 cursor-pointer overflow-hidden origin-bottom animate-pulse-glow" style="transform: rotate(-10deg) translateX(-100px); animation-delay: 1s;">
<div class="absolute inset-0 card-pattern opacity-40"></div>
<div class="absolute inset-4 border border-secondary/15 rounded-xl flex items-center justify-center backdrop-blur-[2px]">
<span class="material-symbols-outlined text-secondary/30 text-4xl">star_rate</span>
</div>
</div>
<!-- Card 4 (Center) -->
<div class="tarot-card absolute w-40 h-64 bg-surface-container rounded-2xl border border-secondary/40 cursor-pointer overflow-hidden origin-bottom z-10 scale-105 animate-pulse-glow" style="transform: rotate(0deg) translateY(-30px); animation-delay: 1.5s;">
<div class="absolute inset-0 card-pattern opacity-60"></div>
<div class="absolute inset-4 border border-secondary/30 rounded-xl flex items-center justify-center bg-secondary/5 backdrop-blur-[4px]">
<span class="material-symbols-outlined text-secondary text-5xl drop-shadow-[0_0_8px_rgba(233,195,73,0.5)]" style="font-variation-settings: 'FILL' 1;">colors_spark</span>
</div>
</div>
<!-- Card 5 -->
<div class="tarot-card absolute w-40 h-64 bg-surface-container-low rounded-2xl border border-outline-variant/20 cursor-pointer overflow-hidden origin-bottom animate-pulse-glow" style="transform: rotate(10deg) translateX(100px); animation-delay: 2s;">
<div class="absolute inset-0 card-pattern opacity-40"></div>
<div class="absolute inset-4 border border-secondary/15 rounded-xl flex items-center justify-center backdrop-blur-[2px]">
<span class="material-symbols-outlined text-secondary/30 text-4xl">star_rate</span>
</div>
</div>
<!-- Card 6 -->
<div class="tarot-card absolute w-40 h-64 bg-surface-container-low rounded-2xl border border-outline-variant/20 cursor-pointer overflow-hidden origin-bottom animate-pulse-glow" style="transform: rotate(20deg) translateX(200px); animation-delay: 2.5s;">
<div class="absolute inset-0 card-pattern opacity-40"></div>
<div class="absolute inset-4 border border-secondary/15 rounded-xl flex items-center justify-center backdrop-blur-[2px]">
<span class="material-symbols-outlined text-secondary/30 text-4xl">star_rate</span>
</div>
</div>
<!-- Card 7 -->
<div class="tarot-card absolute w-40 h-64 bg-surface-container-low rounded-2xl border border-outline-variant/20 cursor-pointer overflow-hidden origin-bottom animate-pulse-glow" style="transform: rotate(30deg) translateX(300px); animation-delay: 3s;">
<div class="absolute inset-0 card-pattern opacity-40"></div>
<div class="absolute inset-4 border border-secondary/15 rounded-xl flex items-center justify-center backdrop-blur-[2px]">
<span class="material-symbols-outlined text-secondary/30 text-4xl">star_rate</span>
</div>
</div>
</div>
<!-- Selected Summary (Floating) -->
<div class="mt-24 flex items-center gap-8 bg-surface-container-low/40 backdrop-blur-xl px-10 py-5 rounded-full border border-outline-variant/20 shadow-2xl transition-all duration-700 hover:bg-surface-container-low/60 group">
<div class="flex flex-col">
<span class="font-label text-[10px] uppercase tracking-[0.25em] text-secondary/80 font-bold">Current Selection</span>
<span class="font-headline italic text-xl text-primary drop-shadow-sm">The Void Awakens</span>
</div>
<div class="h-10 w-[1px] bg-outline-variant/30"></div>
<div class="flex gap-3">
<div class="w-2.5 h-2.5 rounded-full bg-secondary glow-orb text-secondary animate-pulse"></div>
<div class="w-2.5 h-2.5 rounded-full bg-surface-container-highest/60 group-hover:bg-surface-container-highest"></div>
<div class="w-2.5 h-2.5 rounded-full bg-surface-container-highest/60 group-hover:bg-surface-container-highest"></div>
</div>
</div>
</main>
<!-- Bottom Navigation Shell -->
<nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-4 pb-8 pt-4 bg-[#14121b]/40 backdrop-blur-2xl rounded-t-[3rem] border-t border-outline-variant/10 shadow-[0_-10px_40px_rgba(0,0,0,0.5)]">
<a class="flex flex-col items-center justify-center text-outline-variant hover:text-primary transition-all duration-500 hover:-translate-y-1" href="#">
<span class="material-symbols-outlined">rotate_auto</span>
<span class="font-label text-[11px] uppercase tracking-widest mt-1.5 opacity-60">Home</span>
</a>
<a class="flex flex-col items-center justify-center text-secondary font-bold scale-110 transition-all duration-500 hover:-translate-y-1" href="#">
<span class="material-symbols-outlined !text-[28px] drop-shadow-[0_0_10px_rgba(233,195,73,0.3)]" style="font-variation-settings: 'FILL' 1;">grid_view</span>
<span class="font-label text-[11px] uppercase tracking-widest mt-1.5">Spreads</span>
</a>
<a class="flex flex-col items-center justify-center text-outline-variant hover:text-primary transition-all duration-500 hover:-translate-y-1" href="#">
<span class="material-symbols-outlined">history_edu</span>
<span class="font-label text-[11px] uppercase tracking-widest mt-1.5 opacity-60">Journal</span>
</a>
</nav>
<!-- Contextual Action: Shuffle -->
<button class="fixed right-8 bottom-32 w-14 h-14 bg-surface-container-high/80 backdrop-blur-md rounded-full border border-outline-variant/20 flex items-center justify-center text-primary hover:text-secondary hover:border-secondary transition-all duration-700 shadow-2xl group active:scale-90 hover:scale-110">
<span class="material-symbols-outlined group-hover:rotate-[360deg] transition-transform duration-1000 ease-in-out">sync</span>
</button>
</body></html>
