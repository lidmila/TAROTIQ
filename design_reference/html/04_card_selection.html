<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>

<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "inverse-primary": "#6349c0",
              "on-primary": "#330b91",
              "surface-tint": "#cbbeff",
              "surface-container": "#211e28",
              "secondary-container": "#af8d11",
              "on-secondary-fixed-variant": "#574500",
              "surface-container-highest": "#36333e",
              "on-primary-container": "#927af3",
              "surface-bright": "#3b3842",
              "surface-dim": "#14121b",
              "on-tertiary-container": "#8c8d8d",
              "on-primary-fixed-variant": "#4a2ea7",
              "surface-container-high": "#2b2933",
              "surface-variant": "#36333e",
              "tertiary": "#c6c6c6",
              "on-surface-variant": "#cbc4d0",
              "outline": "#948e99",
              "on-secondary": "#3c2f00",
              "on-error": "#690005",
              "on-secondary-container": "#342800",
              "inverse-on-surface": "#322f39",
              "secondary": "#e9c349",
              "primary": "#cbbeff",
              "on-tertiary": "#2f3131",
              "inverse-surface": "#e6e0ee",
              "secondary-fixed": "#ffe088",
              "on-background": "#e6e0ee",
              "error-container": "#93000a",
              "tertiary-fixed": "#e3e2e2",
              "on-primary-fixed": "#1e0061",
              "on-secondary-fixed": "#241a00",
              "surface-container-low": "#1c1a24",
              "tertiary-container": "#242626",
              "on-tertiary-fixed": "#1a1c1c",
              "primary-fixed": "#e7deff",
              "secondary-fixed-dim": "#e9c349",
              "on-tertiary-fixed-variant": "#464747",
              "primary-fixed-dim": "#cbbeff",
              "primary-container": "#28007b",
              "error": "#ffb4ab",
              "on-error-container": "#ffdad6",
              "outline-variant": "#49454e",
              "on-surface": "#e6e0ee",
              "tertiary-fixed-dim": "#c6c6c6",

              "surface-container-lowest": "#0f0d16",
              "background": "#14121b"

            fontFamily: {
              "headline": ["Noto Serif"],
              "body": ["Manrope"],
              "label": ["Manrope"]
            },
            borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 200, 'GRAD' 0, 'opsz' 24;
        }
        .card-arc-container {
            perspective: 1200px;
        }
        .tarot-card {
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.4s ease;
        }
        .tarot-card:hover {
            transform: translateY(-40px) scale(1.05) rotate(0deg) !important;
            z-index: 50 !important;
        }
        .celestial-glow {
            box-shadow: 0 0 20px rgba(203, 190, 255, 0.08);
        }
        .tarot-card:hover .celestial-glow {
            box-shadow: 0 0 35px rgba(233, 195, 73, 0.2);
        }
        /* Custom mask for card pattern */
        .card-pattern {
            background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23e9c349' fill-opacity='0.05'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4v-4H4v4H0v2h4v4h2v-4h4v-2H6zm30 0v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-surface font-body selection:bg-primary/30 min-h-screen flex flex-col overflow-hidden">
<!-- Top Navigation Anchor -->
<header class="bg-[#14121b] flex justify-between items-center w-full px-6 py-4 fixed top-0 z-50">
<div class="flex items-center gap-3">
<div class="w-10 h-10 rounded-full bg-surface-container-high flex items-center justify-center overflow-hidden border border-outline-variant/10">
<img alt="User Profile" class="w-full h-full object-cover" data-alt="Portrait of a spiritual seeker avatar" src="https://lh3.googleusercontent.com/aida-public/AB6AXuB__usBTmQW6ns6tN1IM7wVEG4vovXy2gcHyWlhKHhYuLbEMKpgvXuSCwr0KEYraIxwNiF2kW-WkVpWLwgzW6D3twRAqTYJeujtbUkCnGaYN0W1sxkmq7XEtv9tdbLSRpRT1iob3ABZBT0VIRkrLLtSzvCOFAZqe1gl-AH7RQNwe2P15SuA353KbjufzqpDDORpsUnJLpGoYwLVMV_R43l8i-TCJddyq4Cj2sFgTv_48DKfDLapYnVWX4t4CpWJoAstfFrYOZzm498"/>
</div>
<span class="font-['Noto_Serif'] font-light tracking-wide text-[#cbbeff]">Archive Access</span>
</div>
<div class="text-2xl font-serif italic text-[#e9c349]">Celestial Archive</div>
<button class="w-10 h-10 flex items-center justify-center text-[#cbbeff] hover:text-[#e9c349] transition-colors duration-300 transform scale-95 transition-transform duration-200">
<span class="material-symbols-outlined">auto_awesome</span>
</button>
</header>
<!-- Main Canvas -->
<main class="flex-grow flex flex-col items-center justify-center pt-24 pb-32 px-4 relative">
<!-- Background Ambient Nebula -->
<div class="absolute inset-0 bg-gradient-to-tr from-primary-container/20 via-transparent to-transparent pointer-events-none opacity-40"></div>
<div class="absolute top-1/4 left-1/4 w-96 h-96 bg-secondary/5 blur-[120px] rounded-full pointer-events-none"></div>
<!-- Guidance Header -->
<div class="text-center mb-16 relative z-10">
<h1 class="font-headline text-4xl md:text-5xl text-on-surface tracking-tight mb-4">Pick 3 cards for your reading</h1>
<p class="font-body text-on-surface-variant max-w-md mx-auto opacity-70 italic">Focus your energy on your intention as you sweep across the deck.</p>
<!-- Selection Progress Indicators -->
<div class="flex justify-center gap-4 mt-8">
<div class="w-12 h-1 bg-secondary rounded-full shadow-[0_0_8px_rgba(233,195,73,0.5)]"></div>
<div class="w-12 h-1 bg-surface-container-highest rounded-full overflow-hidden">
<div class="h-full bg-gradient-to-r from-secondary to-primary w-0"></div>
</div>
<div class="w-12 h-1 bg-surface-container-highest rounded-full"></div>
</div>
</div>
<!-- Tarot Arc Selection -->
<div class="w-full max-w-6xl h-96 flex items-end justify-center card-arc-container relative">
<!-- Loop to generate cards in an arc -->
<!-- Card 1 -->
<div class="tarot-card absolute w-40 h-64 bg-surface-container-low rounded-xl celestial-glow border border-outline-variant/10 cursor-pointer overflow-hidden origin-bottom" style="transform: rotate(-30deg) translateX(-280px);">
<div class="absolute inset-0 card-pattern opacity-40"></div>
<div class="absolute inset-4 border border-secondary/20 rounded-lg flex items-center justify-center">
<span class="material-symbols-outlined text-secondary/30 text-4xl">star</span>
</div>
</div>
<!-- Card 2 -->
<div class="tarot-card absolute w-40 h-64 bg-surface-container-low rounded-xl celestial-glow border border-outline-variant/10 cursor-pointer overflow-hidden origin-bottom" style="transform: rotate(-20deg) translateX(-180px);">
<div class="absolute inset-0 card-pattern opacity-40"></div>
<div class="absolute inset-4 border border-secondary/20 rounded-lg flex items-center justify-center">
<span class="material-symbols-outlined text-secondary/30 text-4xl">star</span>
</div>
</div>
<!-- Card 3 -->
<div class="tarot-card absolute w-40 h-64 bg-surface-container-low rounded-xl celestial-glow border border-outline-variant/10 cursor-pointer overflow-hidden origin-bottom" style="transform: rotate(-10deg) translateX(-80px);">
<div class="absolute inset-0 card-pattern opacity-40"></div>
<div class="absolute inset-4 border border-secondary/20 rounded-lg flex items-center justify-center">
<span class="material-symbols-outlined text-secondary/30 text-4xl">star</span>
</div>
</div>
<!-- Card 4 (Center) -->
<div class="tarot-card absolute w-40 h-64 bg-surface-container-low rounded-xl celestial-glow border border-secondary/40 cursor-pointer overflow-hidden origin-bottom z-10 scale-105" style="transform: rotate(0deg) translateY(-20px);">
<div class="absolute inset-0 card-pattern opacity-60"></div>
<div class="absolute inset-4 border border-secondary/30 rounded-lg flex items-center justify-center bg-secondary/5">
<span class="material-symbols-outlined text-secondary text-5xl" style="font-variation-settings: 'FILL' 1;">colors_spark</span>
</div>
</div>
<!-- Card 5 -->
<div class="tarot-card absolute w-40 h-64 bg-surface-container-low rounded-xl celestial-glow border border-outline-variant/10 cursor-pointer overflow-hidden origin-bottom" style="transform: rotate(10deg) translateX(80px);">
<div class="absolute inset-0 card-pattern opacity-40"></div>
<div class="absolute inset-4 border border-secondary/20 rounded-lg flex items-center justify-center">
<span class="material-symbols-outlined text-secondary/30 text-4xl">star</span>
</div>
</div>
<!-- Card 6 -->
<div class="tarot-card absolute w-40 h-64 bg-surface-container-low rounded-xl celestial-glow border border-outline-variant/10 cursor-pointer overflow-hidden origin-bottom" style="transform: rotate(20deg) translateX(180px);">
<div class="absolute inset-0 card-pattern opacity-40"></div>
<div class="absolute inset-4 border border-secondary/20 rounded-lg flex items-center justify-center">
<span class="material-symbols-outlined text-secondary/30 text-4xl">star</span>
</div>
</div>
<!-- Card 7 -->
<div class="tarot-card absolute w-40 h-64 bg-surface-container-low rounded-xl celestial-glow border border-outline-variant/10 cursor-pointer overflow-hidden origin-bottom" style="transform: rotate(30deg) translateX(280px);">
<div class="absolute inset-0 card-pattern opacity-40"></div>
<div class="absolute inset-4 border border-secondary/20 rounded-lg flex items-center justify-center">
<span class="material-symbols-outlined text-secondary/30 text-4xl">star</span>
</div>
</div>
</div>
<!-- Selected Summary (Floating) -->
<div class="mt-24 flex items-center gap-6 bg-surface-container-low/40 backdrop-blur-md px-8 py-4 rounded-full border border-outline-variant/10">
<div class="flex flex-col">
<span class="font-label text-[10px] uppercase tracking-[0.2em] text-secondary">Current Selection</span>
<span class="font-headline italic text-lg text-primary">The Void Awakens</span>
</div>
<div class="h-8 w-[1px] bg-outline-variant/20"></div>
<div class="flex gap-2">
<div class="w-2 h-2 rounded-full bg-secondary shadow-[0_0_8px_#e9c349]"></div>
<div class="w-2 h-2 rounded-full bg-surface-container-highest"></div>
<div class="w-2 h-2 rounded-full bg-surface-container-highest"></div>
</div>
</div>
</main>
<!-- Bottom Navigation Shell -->
<nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-4 pb-6 pt-3 bg-[#14121b]/60 backdrop-blur-xl rounded-t-[2rem] shadow-[0_-4px_24px_rgba(203,190,255,0.06)]">
<a class="flex flex-col items-center justify-center text-[#49454e] opacity-70 hover:opacity-100 hover:text-[#cbbeff] transition-colors duration-300" href="#">
<span class="material-symbols-outlined" data-icon="auto_mirrored_reveal_auto">rotate_auto</span>
<span class="font-['Manrope'] text-[11px] uppercase tracking-[0.1em] mt-1">Home</span>
</a>
<a class="flex flex-col items-center justify-center text-[#e9c349] font-bold scale-110 transition-transform duration-200" href="#">
<span class="material-symbols-outlined" data-icon="grid_view" style="font-variation-settings: 'FILL' 1;">grid_view</span>
<span class="font-['Manrope'] text-[11px] uppercase tracking-[0.1em] mt-1">Spreads</span>
</a>
<a class="flex flex-col items-center justify-center text-[#49454e] opacity-70 hover:opacity-100 hover:text-[#cbbeff] transition-colors duration-300" href="#">
<span class="material-symbols-outlined" data-icon="history_edu">history_edu</span>
<span class="font-['Manrope'] text-[11px] uppercase tracking-[0.1em] mt-1">Journal</span>
</a>
</nav>
<!-- Contextual Action (Suppressed based on prompt focus, but added as ghost for "Shuffle") -->
<button class="fixed right-8 bottom-28 w-14 h-14 bg-surface-container-high rounded-full border border-outline-variant/20 flex items-center justify-center text-primary hover:text-secondary hover:border-secondary transition-all duration-300 shadow-xl group">
<span class="material-symbols-outlined group-hover:rotate-180 transition-transform duration-500">sync</span>
</button>
</body></html>
